<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dotfield — minimal (script tag)</title>
  <style>
    html, body { margin: 0; height: 100%; background: #f4efe6; }
    canvas { display: block; width: 100%; height: 100%; }
    .label {
      position: fixed; left: 1rem; bottom: 1rem; z-index: 2;
      font: 500 0.8rem/1.4 system-ui, sans-serif; color: #5c5348;
      background: rgba(244,239,230,0.85); padding: 0.5rem 0.75rem; border-radius: 8px;
    }
  </style>
</head>
<body>
  <canvas id="dots"></canvas>
  <div class="label">Minimal embed · mode <code id="m">…</code></div>
  <!-- Prefer: npm install dotfield  (or file: path) then bundle / copy package main -->
  <script src="../lib/dotfield.js"></script>
  <script>
    var field = Dotfield.create(document.getElementById("dots"), {
      mode: "orbit-steady-cw-mid",
      fillParent: true,
      palette: "terracotta",
      speed: 1,
      intensity: 1.1,
    });
    document.getElementById("m").textContent = field.getMode();
  </script>
</body>
</html>
